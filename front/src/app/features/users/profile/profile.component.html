<div class="profil" *ngIf="user">
  <div class="profil-header">
    <h1>Profil utilisateur</h1>
  </div>

  <div class="profil-form">
    <form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="profile-form">
      <div class="form-group">
        <input type="text" formControlName="username" class="custom-input">
      </div>

      <div class="form-field">
        <input type="email" formControlName="email" class="custom-input">
      </div>

      <div class="form-field">
        <input type="password" formControlName="password" class="custom-input">
      </div>

      <div class="form-actions">
        <button type="submit" [disabled]="userForm.invalid" class="button-primary">
          Sauvegarder
        </button>
      </div>
    </form>
    <div *ngIf="onError" class="error-message">
      <p>{{ errorMessage || "Remplissez tous les champs"}}</p>
    </div>
  </div>

<hr>

<div class="subscriptions" *ngIf="user">
  <h2>Abonnements</h2>

  <div class="topic-list">
    <div class="topic-card" *ngFor="let topic of user.topics">
      <div class="topic-title">
        <h3>{{ topic.name }}</h3>
      </div>
      <div class="topic-description">
        <p>{{ topic.description }}</p>
      </div>
      <div class="topic-actions">
        <button (click)="topic.id && unsubscribe(topic.id)" class="button-primary">
          Se désabonner
        </button>
      </div>
    </div>
  </div>
  </div>
</div>
