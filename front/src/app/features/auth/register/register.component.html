<div class="register">
  <div class="register-header">
    <img src="MDD.png" alt="Logo" class="logo">
    <button type="button" (click)="goBack()" class="back-btn">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h1>Inscription</h1>
  </div>

  <div class="register-section">
   <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="form-field">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" formControlName="username" class="custom-input">
      </div>

      <div class="form-field">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" formControlName="email" class="custom-input">
      </div>

      <div class="form-field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" formControlName="password" class="custom-input">
      </div>

      <div *ngIf="onError" class="error-message">
        <p>{{ errorMessage || "Test"}}</p>
      </div>

      <button type="submit" class="button-primary">S'inscrire</button>
    </form>
  </div>
</div>
