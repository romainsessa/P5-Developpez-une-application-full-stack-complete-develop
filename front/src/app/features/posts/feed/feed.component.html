<div class="post">
  <div class="post-actions">
    <button class="button-primary" routerLink="/create-post">
      Créer un article
    </button>
    <button class="sort-btn" (click)="onSort()">
      Trier par
      <mat-icon>arrow_downward</mat-icon>
    </button>
  </div>
  <div class="post-list" *ngIf="posts$ | async as posts;">
    <a class="post-card" *ngFor="let post of posts" [routerLink]="['/posts', post.id]">
      <div class="post-title">
        <h2>{{ post.title }}</h2>
      </div>
      <div class="post-meta">
        <span>{{ post.createdAt }}</span>
        <span>{{ post.author }}</span>
      </div>
      <div class="post-description">
        <p>{{ post.content }}</p>
      </div>
    </a>
  </div>
</div>
